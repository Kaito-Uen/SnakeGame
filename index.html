<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="eyebrow">Classic</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <div class="status-row">
          <p id="status">Press any arrow key or WASD to start.</p>
          <div class="actions">
            <button id="pause-button" type="button">Pause</button>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div
          id="game-board"
          class="board"
          role="grid"
          aria-label="Snake board"
        ></div>

        <div class="controls" aria-label="On-screen controls">
          <button data-direction="up" type="button">Up</button>
          <div class="controls__row">
            <button data-direction="left" type="button">Left</button>
            <button data-direction="down" type="button">Down</button>
            <button data-direction="right" type="button">Right</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./src/main.js"></script>
  </body>
</html>
